apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallet
  template:
    metadata:
      labels:
        app: wallet
    spec:
      containers:
        - name: wallet
          image: ankiitsingh21/wallet
          env: 
            - name: MONGO_URI
              value: mongodb://mongo-wallet-srv:27017/wallet
            - name: JWT_KEY
              valueFrom: 
                 secretKeyRef:
                     name: jwt-secret
                     key: JWT_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-srv
spec:
  selector:
    app: wallet
  ports:
    - name: wallet
      protocol: TCP
      port: 3000
      targetPort: 3000