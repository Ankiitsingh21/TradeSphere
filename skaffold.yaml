apiVersion: skaffold/v2alpha3
kind: Config

deploy:
  kubectl:
    manifests:
        - ./infra/k8s/*

build:
    local:
      push: false
    artifacts:
      - image: ankiitsingh21/auth
        context: auth
        docker:
          dockerfile: Dockerfile
        sync:
          manual:
            - src: 'src/**/*.ts'
              dest: .
      - image: ankiitsingh21/wallet
        context: wallet
        docker:
          dockerfile: Dockerfile
        sync:
          manual:
            - src: 'src/**/*.ts'
              dest: .
      - image: ankiitsingh21/order
        context: order
        docker:
          dockerfile: Dockerfile
        sync:
          manual:
            - src: 'src/**/*.ts'
              dest: .
      - image: ankiitsingh21/stock
        context: stock
        docker:
          dockerfile: Dockerfile
        sync:
          manual:
            - src: 'src/**/*.ts'
              dest: .
      - image: ankiitsingh21/portfolio
        context: portfolio
        docker:
          dockerfile: Dockerfile
        sync:
          manual:
            - src: 'src/**/*.ts'
              dest: .
      - image: ankiitsingh21/tradeengine
        context: tradeengine
        docker:
          dockerfile: Dockerfile
        sync:
          manual:
            - src: 'src/**/*.ts'
              dest: .
      - image: ankiitsingh21/expiration
        context: expiration
        docker:
          dockerfile: Dockerfile
        sync:
          manual:
            - src: 'src/**/*.ts'
              dest: .
      - image: ankiitsingh21/client
        context: client
        docker:
          dockerfile: Dockerfile
        sync:
          manual:
            - src: '**/*.js'
              dest: .